name: Build Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build job artifact
        run: mvn --batch-mode clean package

      - name: Build Docker image
        run: docker build -t tenant-b-flink-job:${{ github.sha }} .
